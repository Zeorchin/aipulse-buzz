<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character - Wuthering Waves Guide</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
    <style>
        .char-page {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }
        .char-header {
            display: flex;
            gap: 60px;
            padding: 50px;
            background: linear-gradient(180deg, var(--element-color) 0%, transparent 100%);
            border-radius: 24px;
            margin-bottom: 40px;
        }
        .char-header-img {
            width: 450px;
            height: 450px;
            object-fit: contain;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
        }
        .char-header-info {
            flex: 1;
            padding-top: 20px;
        }
        .char-header-info h1 {
            font-size: 56px;
            margin: 0 0 15px 0;
            color: #fff;
        }
        .char-rarity {
            font-size: 28px;
            color: #ffd700;
            margin-right: 20px;
        }
        .char-badges {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .char-badge {
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
        }
        .badge-element { background: var(--element-color); color: #000; }
        .badge-weapon { background: #9b59b6; color: #fff; }
        .badge-role { background: #3498db; color: #fff; }
        .char-faction {
            color: #888;
            margin: 15px 0;
            font-size: 18px;
        }
        .char-intro {
            color: #ccc;
            line-height: 1.8;
            margin-top: 25px;
            font-size: 18px;
        }
        
        .char-stats-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 20px;
            margin: 40px 0;
        }
        .char-stat-box {
            background: #1a1a2e;
            padding: 25px;
            border-radius: 16px;
            text-align: center;
        }
        .char-stat-icon {
            font-size: 36px;
            margin-bottom: 10px;
        }
        .char-stat-label {
            color: #888;
            font-size: 14px;
            text-transform: uppercase;
        }
        .char-stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
        }
        
        .char-section {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
        }
        
        .char-section h2 {
            font-size: 28px;
            color: #fff;
            margin: 0 0 25px 0;
            padding-bottom: 15px;
            border-bottom: 2px solid #333;
        }
        
        .char-section h3 {
            font-size: 22px;
            color: #aaa;
            margin: 30px 0 20px 0;
        }
        .char-section h2 {
            color: #fff;
            margin: 0 0 20px 0;
            padding-bottom: 15px;
            border-bottom: 2px solid #333;
        }
        .char-section h3 {
            color: #aaa;
            margin: 25px 0 15px 0;
        }
        
        .materials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .material-item {
            display: flex;
            align-items: center;
            gap: 18px;
            background: #252540;
            padding: 20px;
            border-radius: 14px;
        }
        .material-item img {
            width: 70px;
            height: 70px;
            object-fit: contain;
        }
        .material-item strong {
            font-size: 18px;
            color: #fff;
        }
        .material-item p {
            font-size: 16px;
            color: #aaa;
            margin: 5px 0 0 0;
        }
        
        .build-item {
            display: flex;
            align-items: center;
            gap: 30px;
            background: #252540;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .build-img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            background: #1a1a2e;
            border-radius: 12px;
        }
        .build-details h3 {
            margin: 0 0 10px 0;
            color: #fff;
            font-size: 24px;
        }
        .build-stats {
            color: #888;
            font-size: 18px;
        }
        .build-desc {
            color: #aaa;
            margin-top: 15px;
            font-size: 16px;
        }
        
        .echo-set-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        .echo-set-item {
            background: #252540;
            padding: 20px;
            border-radius: 14px;
            text-align: center;
        }
        .echo-set-item img {
            width: 90px;
            height: 90px;
            object-fit: contain;
        }
        .echo-set-item div {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            margin: 10px 0;
        }
        .echo-set-item small {
            font-size: 14px;
            color: #aaa;
        }
        .echo-set-item.piece-4 { border: 3px solid #ffd700; }
        
        .echo-bonus {
            background: #252540;
            padding: 25px;
            border-radius: 16px;
            color: #ccc;
            white-space: pre-line;
            font-size: 16px;
            line-height: 1.8;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #6ee7ff;
            text-decoration: none;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .back-link:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            padding: 100px;
            color: #888;
        }

        .error {
            text-align: center;
            padding: 100px;
            color: #ff6b6b;
        }

        @media (max-width: 768px) {
            .char-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .char-header-img {
                width: 200px;
                height: 200px;
            }
            .echo-set-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .skill-item {
            background: #252540;
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .skill-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }
        .skill-header img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            background: #1a1a2e;
            border-radius: 12px;
        }
        .skill-header h4 {
            color: #fff;
            font-size: 22px;
            margin: 0;
        }
        .skill-header p {
            color: #888;
            font-size: 14px;
            margin: 5px 0 0 0;
        }
        .skill-desc {
            color: #ccc;
            font-size: 16px;
            line-height: 1.8;
        }

        .chain-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .chain-item {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            background: #252540;
            padding: 25px;
            border-radius: 16px;
            position: relative;
        }
        .chain-number {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
        }
        .chain-item img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            background: #1a1a2e;
            border-radius: 10px;
        }
        .chain-item h4 {
            color: #fff;
            font-size: 18px;
            margin: 0 0 8px 0;
        }
        .chain-item p {
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
            margin: 0;
        }

        @media (max-width: 768px) {
            .chain-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="../../gaming.html" class="logo" style="text-decoration: none;">
                <img src="../images/logo.png" alt="Logo" class="logo-icon">
                <h1>Wuthering Waves Guide</h1>
            </div>
            <nav>
                <a href="../index.html#home">Home</a>
                <a href="../index.html#tier-list">Tier List</a>
                <a href="../index.html#characters">Characters</a>
                <a href="../index.html#weapons">Weapons</a>
                <a href="../index.html#teams">Best Teams</a>
                <a href="../index.html#echoes">Echoes</a>
                <a href="../index.html#version">Version</a>
                <a href="../../gaming.html" style="color: #667eea; font-weight: 600;">← Gaming Hub</a>
            </nav>
        </div>
    </header>

    <main class="char-page" id="char-content">
        <div class="loading">Loading character...</div>
    </main>

    <footer>
        <div class="container">
            <p>Wuthering Waves Guide - Not affiliated with Kuro Games. All game assets and trademarks belong to their respective owners.</p>
        </div>
    </footer>

    <script src="../js/character-data.js"></script>
    <script>
        // Debug - check if character data loaded
        if (typeof characters === 'undefined') {
            document.getElementById('char-content').innerHTML = '<div class="error"><h2>Error loading character data</h2><p>Please refresh the page or try again.</p></div>';
            throw new Error('Character data not loaded');
        }
        
        const elementColors = {
            'Glacio': '#6ee7ff',
            'Aero': '#6bff6b',
            'Fusion': '#ff6b6b',
            'Electro': '#b366ff',
            'Spectro': '#ffcc00',
            'Havoc': '#ff4757'
        };

        function getCharacterFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('char') || 'baizhi';
        }

        function formatNumber(num) {
            return num ? num.toLocaleString() : 'N/A';
        }

        function renderCharacter(charKey) {
            const char = characters[charKey];
            const content = document.getElementById('char-content');
            
            if (!char) {
                content.innerHTML = `
                    <a href="../index.html#characters" class="back-link">← Back to Characters</a>
                    <div class="error">
                        <h2>Character not found</h2>
                        <p>Character "${charKey}" not found in database.</p>
                    </div>
                `;
                return;
            }

            const elementColor = elementColors[char.element] || '#ccc';
            document.title = `${char.name} Build & Info - Wuthering Waves Guide`;
            document.documentElement.style.setProperty('--element-color', elementColor);

            const rarityStars = '★'.repeat(char.rarity);
            const roleLabel = char.role.charAt(0).toUpperCase() + char.role.slice(1);

            content.innerHTML = `
                <a href="../index.html#characters" class="back-link">← Back to Characters</a>
                
                <div class="char-header">
                    <img src="${char.image}" alt="${char.name}" class="char-header-img">
                    <div class="char-header-info">
                        <h1>${char.name}</h1>
                        <span class="char-rarity">${rarityStars}</span>
                        <div class="char-badges">
                            <span class="char-badge badge-element">${char.element}</span>
                            <span class="char-badge badge-weapon">${char.weapon}</span>
                            <span class="char-badge badge-role">${roleLabel}</span>
                        </div>
                        <p class="char-faction">Faction: ${char.faction || 'Unknown'}</p>
                        <p class="char-faction">Birthday: ${char.birthday || 'Unknown'}</p>
                        <p class="char-intro">${char.intro}</p>
                    </div>
                </div>

                <div class="char-stats-grid">
                    <div class="char-stat-box">
                        <div class="char-stat-icon">❤️</div>
                        <div class="char-stat-label">HP</div>
                        <div class="char-stat-value">${formatNumber(char.hp)}</div>
                    </div>
                    <div class="char-stat-box">
                        <div class="char-stat-icon">⚔️</div>
                        <div class="char-stat-label">ATK</div>
                        <div class="char-stat-value">${formatNumber(char.atk)}</div>
                    </div>
                    <div class="char-stat-box">
                        <div class="char-stat-icon">🛡️</div>
                        <div class="char-stat-label">DEF</div>
                        <div class="char-stat-value">${formatNumber(char.def)}</div>
                    </div>
                    <div class="char-stat-box">
                        <div class="char-stat-icon">🎯</div>
                        <div class="char-stat-label">Crit Rate</div>
                        <div class="char-stat-value">${char.critRate}%</div>
                    </div>
                    <div class="char-stat-box">
                        <div class="char-stat-icon">💥</div>
                        <div class="char-stat-label">Crit DMG</div>
                        <div class="char-stat-value">${char.critDmg}%</div>
                    </div>
                    <div class="char-stat-box">
                        <div class="char-stat-icon">⚡</div>
                        <div class="char-stat-label">Energy Regen</div>
                        <div class="char-stat-value">${char.energyRegen}%</div>
                    </div>
                    <div class="char-stat-box">
                        <div class="char-stat-icon">💎</div>
                        <div class="char-stat-label">Max Energy</div>
                        <div class="char-stat-value">${char.maxEnergy}</div>
                    </div>
                </div>

                <div class="char-section">
                    <h2>${char.name} Ascension Materials</h2>
                    <div class="materials-grid">
                        ${char.ascension.map(m => `
                            <div class="material-item">
                                <img src="${m.img}" alt="${m.name}">
                                <div>
                                    <strong>${m.name}</strong>
                                    <p>${m.qty.toLocaleString()}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="char-section">
                    <h2>${char.name} Best Build</h2>
                    <h3>Best Weapon</h3>
                    <div class="build-item">
                        <img src="${char.bestWeapon.img}" alt="${char.bestWeapon.name}" class="build-img">
                        <div class="build-details">
                            <h3>${char.bestWeapon.name}</h3>
                            <div class="build-stats">Level 90 • ATK ${char.bestWeapon.atk}${char.bestWeapon.critRate ? ' • Crit Rate ' + char.bestWeapon.critRate + '%' : ''}${char.bestWeapon.energyRegen ? ' • Energy Regen ' + char.bestWeapon.energyRegen + '%' : ''}</div>
                            <p class="build-desc">${char.bestWeapon.desc}</p>
                        </div>
                    </div>

                    <h3>Best Echo Set</h3>
                    <div class="echo-set-grid">
                        ${char.echoSet.map(echo => `
                            <div class="echo-set-item ${echo.pieces === 4 ? 'piece-4' : ''}">
                                <img src="${echo.img}" alt="${echo.name}">
                                <div>${echo.pieces}</div>
                                <small>${echo.name}</small>
                            </div>
                        `).join('')}
                    </div>
                    <div class="echo-bonus">${char.echoBonus}</div>
                </div>

                ${char.skills ? `
                <div class="char-section">
                    <h2>${char.name} Skills</h2>
                    
                    <h3>Basic Attack</h3>
                    <div class="skill-item">
                        <div class="skill-header">
                            <img src="${char.skills.basicAttack.img}" alt="${char.skills.basicAttack.name}">
                            <div>
                                <h4>${char.skills.basicAttack.name}</h4>
                                <p>${char.skills.basicAttack.type}</p>
                            </div>
                        </div>
                        <p class="skill-desc">${char.skills.basicAttack.desc}</p>
                    </div>

                    <h3>Resonance Skill</h3>
                    <div class="skill-item">
                        <div class="skill-header">
                            <img src="${char.skills.resonanceSkill.img}" alt="${char.skills.resonanceSkill.name}">
                            <div>
                                <h4>${char.skills.resonanceSkill.name}</h4>
                                <p>${char.skills.resonanceSkill.type}</p>
                            </div>
                        </div>
                        <p class="skill-desc">${char.skills.resonanceSkill.desc}</p>
                    </div>

                    <h3>Forte</h3>
                    <div class="skill-item">
                        <div class="skill-header">
                            <img src="${char.skills.forte.img}" alt="${char.skills.forte.name}">
                            <div>
                                <h4>${char.skills.forte.name}</h4>
                                <p>${char.skills.forte.type}</p>
                            </div>
                        </div>
                        <p class="skill-desc">${char.skills.forte.desc}</p>
                    </div>

                    <h3>Intro Skill</h3>
                    <div class="skill-item">
                        <div class="skill-header">
                            <img src="${char.skills.intro.img}" alt="${char.skills.intro.name}">
                            <div>
                                <h4>${char.skills.intro.name}</h4>
                                <p>${char.skills.intro.type}</p>
                            </div>
                        </div>
                        <p class="skill-desc">${char.skills.intro.desc}</p>
                    </div>

                    <h3>Outro Skill</h3>
                    <div class="skill-item">
                        <div class="skill-header">
                            <img src="${char.skills.outro.img}" alt="${char.skills.outro.name}">
                            <div>
                                <h4>${char.skills.outro.name}</h4>
                                <p>${char.skills.outro.type}</p>
                            </div>
                        </div>
                        <p class="skill-desc">${char.skills.outro.desc}</p>
                    </div>
                </div>
                ` : ''}

                ${char.resonanceChain ? `
                <div class="char-section">
                    <h2>${char.name} Resonance Chain</h2>
                    <div class="chain-grid">
                        ${char.resonanceChain.map((chain, i) => `
                            <div class="chain-item">
                                <div class="chain-number">${i + 1}</div>
                                <img src="${chain.img}" alt="${chain.name}">
                                <div>
                                    <h4>${chain.name}</h4>
                                    <p>${chain.desc}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                ` : ''}
            `;
        }

        const charKey = getCharacterFromURL();
        console.log('Character key:', charKey);
        console.log('Characters object:', characters);
        console.log('Character data:', characters[charKey]);
        renderCharacter(charKey);
    </script>
</body>
</html>
